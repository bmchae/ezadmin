<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ezadmin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #212529; }
        .text-profit { color: #dc3545 !important; }
        .text-loss { color: #0d6efd !important; }
        .table th { background-color: #e9ecef; white-space: nowrap; }
        .table td { white-space: nowrap; }
        .badge-ezgain { background-color: #198754; }
        .badge-ezinvest { background-color: #6f42c1; }
        .badge-kr { background-color: #0d6efd; }
        .badge-us { background-color: #fd7e14; }
        .summary-card { border-left: 4px solid #212529; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid px-5">
            <a class="navbar-brand fw-bold" href="/">ezadmin</a>
            <span class="text-light small">Portfolio Dashboard</span>
        </div>
    </nav>
    <div class="container-fluid px-5" style="max-width: 95%;">
        {% block content %}{% endblock %}
    </div>
    <footer class="text-center text-muted py-4 mt-4">
        <small>ezadmin &mdash; ezgain / ezinvest portfolio viewer</small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
